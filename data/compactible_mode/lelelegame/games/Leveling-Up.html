                for (const n of npcs) { const nearest = alive.reduce((a, b) => dist(n, a) < dist(n, b) ? a : b); n.updateColor(nearest); }
                if (Math.random() < CONFIG.ITEM_CHANCE && items.length < 2) items.push(spawnItem(alive[0]));
                for (let i = items.length - 1; i >= 0; i--) {
                    let far = true;
                    for (const p of alive) if (dist(items[i], p) < CONFIG.DESPAWN_DIST) { far = false; break; }
                    if (far) items.splice(i, 1);
                    else { items[i].life -= 0.016; if (items[i].life <= 0) items.splice(i, 1); }
                }
            }

            function updateCamera() {
                const alive = players.filter(p => p.alive);
                if (alive.length === 0) return;
                let cx = 0, cy = 0; alive.forEach(p => { cx += p.x; cy += p.y; });
                cx /= alive.length; cy /= alive.length;
                camera.tx = cx; camera.ty = cy;
                camera.x = lerp(camera.x, camera.tx, CONFIG.CAM_SMOOTH);
                camera.y = lerp(camera.y, camera.ty, CONFIG.CAM_SMOOTH);
                const maxLv = Math.max(...players.map(p => p.level));
                globalScale = 1 / (Math.floor(maxLv / 50) + 1);
            }

            function checkDeaths() { for (const p of players) if (p.alive && p.level < 2) p.die(); }

            function drawBackground(clipRect = null) {
                ctx.save();
                if (clipRect) { ctx.beginPath(); ctx.rect(clipRect.x, clipRect.y, clipRect.w, clipRect.h); ctx.clip(); }
                ctx.translate(W / 2, H / 2); ctx.scale(globalScale, globalScale); ctx.translate(-camera.x, -camera.y);
                ctx.fillStyle = '#0a0a18';
                ctx.fillRect(camera.x - W / globalScale, camera.y - H / globalScale, 2 * W / globalScale, 2 * H / globalScale);
                const gs = CONFIG.GRID;
                ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
                ctx.beginPath();
                const sx = Math.floor((camera.x - W / globalScale) / gs) * gs;
                const sy = Math.floor((camera.y - H / globalScale) / gs) * gs;
                for (let x = sx; x <= camera.x + W / globalScale; x += gs) { ctx.moveTo(x, sy); ctx.lineTo(x, camera.y + H / globalScale); }
                for (let y = sy; y <= camera.y + H / globalScale; y += gs) { ctx.moveTo(sx, y); ctx.lineTo(camera.x + W / globalScale, y); }
                ctx.stroke();
                ctx.restore();
            }

            function drawBall(x, y, r, cRgb, glow, alpha = 1) {
                ctx.save(); ctx.globalAlpha = alpha;
                if (glow) { const g = ctx.createRadialGradient(x, y, r * 0.6, x, y, r * 2.2); g.addColorStop(0, glow); g.addColorStop(1, 'rgba(0,0,0,0)'); ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r * 2.2, 0, Math.PI * 2); ctx.fill(); }
                const col = `rgb(${cRgb.r},${cRgb.g},${cRgb.b})`;
                const light = `rgb(${Math.min(255,cRgb.r+70)},${Math.min(255,cRgb.g+70)},${Math.min(255,cRgb.b+70)})`;
                const dark = `rgb(${Math.max(0,cRgb.r-60)},${Math.max(0,cRgb.g-60)},${Math.max(0,cRgb.b-60)})`;
                const g = ctx.createRadialGradient(x - r * 0.25, y - r * 0.3, r * 0.08, x, y, r);
                g.addColorStop(0, light); g.addColorStop(0.55, col); g.addColorStop(1, dark);
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = Math.max(1, r * 0.08); ctx.stroke();
                ctx.restore();
            }

            function drawPlayer(p) {
                if (!p.alive) return;
                if (p.levelUpEffect > 0) {
                    ctx.strokeStyle = `rgba(255,215,50,${p.levelUpEffect/0.8})`; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius + 50, 0, Math.PI * 2); ctx.stroke();
                }
                const crgb = p.index === 0 ? { r: 255, g: 210, b: 40 } : { r: 64, g: 196, b: 255 };
                drawBall(p.x, p.y, p.radius, crgb, p.color.glow);
                if (p.shieldTimer > 0) { ctx.strokeStyle = 'rgba(100,255,200,0.8)'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius + 6, 0, Math.PI * 2); ctx.stroke(); }
                ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.max(9, p.radius * 0.5)}px sans-serif`; ctx.textAlign = 'center';
                ctx.fillText('⭐', p.x, p.y - p.radius - 8);
                ctx.fillText(p.name, p.x, p.y + p.radius + 18);
            }

            function drawItems() {
                for (const it of items) {
                    ctx.fillStyle = it.type === 'shield' ? '#4fc3f7' : '#ffb74d';
                    ctx.beginPath(); ctx.arc(it.x, it.y, it.radius, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText(it.type === 'shield' ? '🛡️' : '⚡', it.x, it.y + 3);
                }
            }

            function renderScene(clipRect = null) {
                ctx.save();
                if (clipRect) { ctx.beginPath(); ctx.rect(clipRect.x, clipRect.y, clipRect.w, clipRect.h); ctx.clip(); }
                ctx.translate(W / 2, H / 2); ctx.scale(globalScale, globalScale); ctx.translate(-camera.x, -camera.y);
                drawBackground();
                for (const n of npcs) drawBall(n.x, n.y, n.radius, n.color, n.type === 'danger' ? 'rgba(255,80,60,0.3)' : (n.type === 'edible' ? 'rgba(80,220,140,0.3)' : 'rgba(100,160,240,0.2)'));
                drawItems();
                for (const p of players) drawPlayer(p);
                for (const pt of particles) { ctx.fillStyle = `rgb(${pt.color.r},${pt.color.g},${pt.color.b})`; ctx.globalAlpha = pt.alpha; ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.radius, 0, Math.PI * 2); ctx.fill(); }
                ctx.globalAlpha = 1;
                for (const ft of floatingTexts) { ctx.fillStyle = ft.color; ctx.globalAlpha = Math.max(0, ft.life / ft.maxLife); ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(ft.text, ft.x, ft.y); }
                ctx.restore();
            }

            function drawHUD() {
                ctx.save(); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                const drawP = (p, x, y) => {
                    const w = 150, h = 65;
                    ctx.fillStyle = 'rgba(10,10,25,0.8)'; ctx.strokeStyle = p.color.glow; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.roundRect(x, y, w, h, 14); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left';
                    ctx.fillText(`${p.name} Lv.${p.level}`, x + 8, y + 18);
                    const ep = p.exp / CONFIG.EXP_PER_LV;
                    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(x + 8, y + 30, w - 16, 6);
                    ctx.fillStyle = p.index === 0 ? '#ffd740' : '#40c4ff';
                    ctx.fillRect(x + 8, y + 30, (w - 16) * Math.min(1, ep), 6);
                    if (!p.alive) { ctx.fillStyle = 'red'; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('💀', x + w / 2, y + h / 2); }
                };
                if (gameMode === 'dual-pk') { drawP(players[0], 20, 20); drawP(players[1], W - 170, 20); }
                else if (players.length > 0) drawP(players[0], 20, 20);
                // PK分隔栏
                if (gameMode === 'dual-pk') {
                    ctx.strokeStyle = 'rgba(255,215,0,0.5)'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
                }
                ctx.restore();
            }
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y); this.lineTo(x + w - r, y); this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r); this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h); this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r); this.quadraticCurveTo(x, y, x + r, y); this.closePath(); return this;
            };

            function gameLoop(ts) {
                if (!gameRunning) return;
                let dt = (ts - lastTime) / 1000;
                if (dt <= 0) dt = 0.016; if (dt > 0.2) dt = 0.2;
                lastTime = ts; gameTime += dt; npcAccum += dt;
                for (const p of players) updatePlayerMove(p, dt);
                const alive = players.filter(p => p.alive);
                for (const n of npcs) updateNpcMove(n, dt, alive[0] || players[0]);
                for (let i = npcs.length - 1; i >= 0; i--) {
                    for (const p of players) if (p.alive && handlePlayerNpcCollision(p, npcs[i], i)) break;
                }
                if (gameMode === 'dual-coop' && players.length >= 2 && players[0].alive && players[1].alive) {
                    const d = dist(players[0], players[1]);
                    if (d > H - 20) { players[0].x = rand(-80, 80); players[0].y = rand(-80, 80); players[1].x = rand(-80, 80); players[1].y = rand(-80, 80); }
                }
                if (gameMode === 'dual-pk' && dualPkPhase === 'playing' && pkEndTime !== Infinity && gameTime >= pkEndTime) { dualPkPhase = 'premerge'; mergeTimer = 120; }
                if (gameMode === 'dual-pk' && dualPkPhase === 'premerge') {
                    mergeTimer -= dt;
                    if (mergeTimer <= 0) { dualPkPhase = 'merge'; npcs = []; items = []; players[0].x = -100; players[1].x = 100; }
                }
                if (gameMode === 'dual-coop') {
                    for (let i = 0; i < 2; i++) {
                        if (!players[i].alive) {
                            const other = players[1 - i];
                            if (other.alive && dist(other, players[i]) < 40) players[i].respawn(Math.floor(other.level / 2));
                            else { coopRescueTimer[i] += dt; if (coopRescueTimer[i] >= 90) { players[i].respawn(1); coopRescueTimer[i] = 0; } }
                        } else coopRescueTimer[i] = 0;
                    }
                }
                for (const it of items) {
                    for (const p of players) {
                        if (p.alive && dist(p, it) < p.radius + it.radius) {
                            if (it.type === 'shield') p.shieldTimer = CONFIG.SHIELD_DUR; else p.speedTimer = CONFIG.SPEED_DUR;
                            sfxPickup(); items.splice(items.indexOf(it), 1); break;
                        }
                    }
                }
                if (gameMode !== 'dual-coop') handlePlayerPlayerCollision(players[0], players[1] || { alive: false });
                for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; p.alpha = Math.max(0, p.life / p.maxLife); if (p.life <= 0) particles.splice(i, 1); }
                for (let i = floatingTexts.length - 1; i >= 0; i--) { const f = floatingTexts[i]; f.y += f.vy * dt; f.life -= dt; if (f.life <= 0) floatingTexts.splice(i, 1); }
                if (npcAccum > 0.4) { npcAccum = 0; manageNpcs(); }
                checkDeaths(); updateCamera();
                if (shake > 0) shake = Math.max(0, shake - dt * 4);
                const sx = shake > 0.01 ? (Math.random() - 0.5) * shake * 10 : 0, sy = shake > 0.01 ? (Math.random() - 0.5) * shake * 10 : 0;
                ctx.clearRect(0, 0, W, H);
                ctx.save(); ctx.translate(sx, sy);
                if (gameMode === 'dual-pk') {
                    renderScene({ x: 0, y: 0, w: W / 2, h: H });
                    ctx.restore(); ctx.save(); ctx.translate(sx, sy);
                    renderScene({ x: W / 2, y: 0, w: W / 2, h: H });
                } else renderScene();
                ctx.restore();
                drawHUD();
                requestAnimationFrame(gameLoop);
            }

            let lastTime = 0;
            function startGame(mode, p1Scheme, p2Scheme, p1Name, p2Name, timeLimit) {
                gameMode = mode; players = [new Player(0, p1Scheme, p1Name)];
                if (mode.startsWith('dual')) players.push(new Player(1, p2Scheme, p2Name));
                npcs = []; particles = []; floatingTexts = []; items = []; keys = {};
                gameTime = 0; shake = 0; npcAccum = 0; dualPkPhase = 'playing'; mergeTimer = 0;
                pkEndTime = timeLimit > 0 ? timeLimit : Infinity;
                for (let i = 0; i < CONFIG.NPC_COUNT; i++) npcs.push(spawnNpcAround(players[0]));
                updateCamera(); gameRunning = true; lastTime = performance.now();
                document.querySelectorAll('.menu-overlay').forEach(e => e.classList.add('hidden'));
                requestAnimationFrame(gameLoop);
            }

            const ALL_KEYS = Object.values(KEY_SCHEMES).flatMap(s => [s.up, s.down, s.left, s.right]);
            window.addEventListener('keydown', e => { const k = e.key.toLowerCase(); if (ALL_KEYS.includes(k)) e.preventDefault(); keys[k] = true; initAudio(); });
            window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
            canvas.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); if (!gameMode?.startsWith('dual') && touchId === null) { const t = e.touches[0]; touchStartX = t.clientX; touchStartY = t.clientY; touchId = t.identifier; touchActive = true; } }, { passive: false });
            canvas.addEventListener('touchmove', e => { e.preventDefault(); if (touchId !== null) { for (let i = 0; i < e.touches.length; i++) { if (e.touches[i].identifier === touchId) { const dx = e.touches[i].clientX - touchStartX, dy = e.touches[i].clientY - touchStartY; const d = Math.sqrt(dx * dx + dy * dy); if (d > TOUCH_DEAD) { const n = Math.min(d, 80) / d; touchDX = dx * n / 80; touchDY = dy * n / 80; } else { touchDX = 0; touchDY = 0; } break; } } } }, { passive: false });
            canvas.addEventListener('touchend', () => { touchActive = false; touchId = null; touchDX = 0; touchDY = 0; });
            canvas.addEventListener('click', () => initAudio());

            const menuMain = document.getElementById('menu-main');
            const menuDualChoice = document.getElementById('menu-dual-choice');
            const menuSetup = document.getElementById('menu-setup');
            const setupContent = document.getElementById('setup-content');

            function showSetup(mode) {
                menuDualChoice.classList.add('hidden');
                menuSetup.classList.remove('hidden');
                let html = `<div style="color:#ffd740; font-weight:bold;">玩家1</div>
                    <input class="nick-input" id="p1name" placeholder="昵称" value="玩家1"><br>
                    键位: <div class="scheme-selector" id="p1scheme">
                        ${Object.keys(KEY_SCHEMES).map(s => `<label class="scheme-option"><input type="radio" name="p1s" value="${s}" ${s==='wasd'?'checked':''}> ${s.toUpperCase()}</label>`).join('')}
                    </div>`;
                if (mode.startsWith('dual')) {
                    html += `<br><div style="color:#ffd740; font-weight:bold;">玩家2</div>
                    <input class="nick-input" id="p2name" placeholder="昵称" value="玩家2"><br>
                    键位: <div class="scheme-selector" id="p2scheme">
                        ${Object.keys(KEY_SCHEMES).map(s => `<label class="scheme-option"><input type="radio" name="p2s" value="${s}" ${s==='ijkl'?'checked':''}> ${s.toUpperCase()}</label>`).join('')}
                    </div>`;
                    if (mode === 'dual-pk') {
                        html += `<br>PK时长: <div class="scheme-selector" id="pktime">
                            <label class="time-option"><input type="radio" name="time" value="120" checked> 2分钟</label>
                            <label class="time-option"><input type="radio" name="time" value="300"> 5分钟</label>
                            <label class="time-option"><input type="radio" name="time" value="600"> 10分钟</label>
                            <label class="time-option"><input type="radio" name="time" value="0"> 无尽</label>
                        </div>`;
                    }
                }
                html += `<br><button class="menu-btn" id="btn-go">开始</button>
                <button class="menu-btn" id="btn-back-setup" style="border-color:rgba(255,255,255,0.3);color:#aaa;">返回</button>`;
                setupContent.innerHTML = html;
                document.getElementById('btn-back-setup').addEventListener('click', () => {
                    menuSetup.classList.add('hidden');
                    if (mode.startsWith('dual')) menuDualChoice.classList.remove('hidden');
                    else menuMain.classList.remove('hidden');
                });
                document.getElementById('btn-go').addEventListener('click', () => {
                    const p1s = document.querySelector('input[name="p1s"]:checked')?.value || 'wasd';
                    const p1n = document.getElementById('p1name')?.value || '玩家1';
                    let p2s = 'ijkl', p2n = '玩家2', time = 0;
                    if (mode.startsWith('dual')) {
                        p2s = document.querySelector('input[name="p2s"]:checked')?.value || 'ijkl';
                        p2n = document.getElementById('p2name')?.value || '玩家2';
                        if (p1s === p2s) { alert('键位不能相同'); return; }
                        if (mode === 'dual-pk') time = parseInt(document.querySelector('input[name="time"]:checked')?.value || '0');
                    }
                    startGame(mode, p1s, p2s, p1n, p2n, time);
                });
            }

            document.getElementById('btn-single').addEventListener('click', () => showSetup('single'));
            document.getElementById('btn-dual').addEventListener('click', () => { menuMain.classList.add('hidden'); menuDualChoice.classList.remove('hidden'); });
            document.getElementById('btn-pk').addEventListener('click', () => showSetup('dual-pk'));
            document.getElementById('btn-coop').addEventListener('click', () => showSetup('dual-coop'));
            document.getElementById('btn-back-choice').addEventListener('click', () => { menuDualChoice.classList.add('hidden'); menuMain.classList.remove('hidden'); });
            window.addEventListener('blur', () => { keys = {}; touchActive = false; });
        })();
    </script>
</body>
</html>
