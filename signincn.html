<!DOCTYPE html>
<body>

    <header>
        <h1><del>唐人协会登陆界面 </del>请输入文本</h1>
    </header>
</body>
<div id="signin">
    <label><input placeholder="账号" type=email id="email"/></label><br/>
    <input type="password" placeholder="密码" id="pwd"/><br/>
    <button id="submit">提交</button>
    </label>
</div>
<p>账号服务不可用,请使用我们的软件登录</p>
<script>
    document.getElementById("submit").addEventListener(click,a);
    if(document.getElementById("email").textContent == "" || document.getElementById("pwd").textContent == "" ){
        alert("Please enter username or password!")
    }
</script>
